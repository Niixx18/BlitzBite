<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">
<!-- Ambient Background Lighting -->
<div class="absolute inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-surface-variant rounded-full blur-3xl opacity-40"></div>
<div class="absolute bottom-[-15%] right-[-10%] w-[40vw] h-[40vw] bg-primary-fixed rounded-full blur-3xl opacity-30"></div>
</div>
<!-- Branding Anchor -->
<div class="absolute top-margin-mobile left-margin-mobile md:top-margin-desktop md:left-margin-desktop z-20">
<span class="font-headline-md text-headline-md md:font-headline-lg md:text-headline-lg font-black text-primary tracking-tighter">BlitzBite</span>
</div>
<!-- Main Content Canvas -->
<main class="flex flex-col items-center justify-center text-center px-margin-mobile z-10 w-full max-w-lg">
<!-- Error Illustration Container -->
<div class="relative mb-stack-lg animate-[pulse_3s_ease-in-out_infinite]">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-error-container/30 flex items-center justify-center relative z-10 shadow-[0px_4px_20px_rgba(186,26,26,0.1)]">
<div class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] md:text-[64px] text-error" data-icon="wifi_off" style="font-variation-settings: 'FILL' 1;">wifi_off</span>
</div>
</div>
<!-- Decorative disconnected dots -->
<div class="absolute top-4 right-0 w-3 h-3 rounded-full bg-error/40 animate-ping"></div>
<div class="absolute bottom-8 left-0 w-2 h-2 rounded-full bg-error/30 animate-pulse"></div>
</div>
<!-- Typography Stack -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-display-lg md:text-display-lg text-on-surface mb-stack-sm tracking-tight text-balance">Connection Lost</h1>
<p class="font-body-md text-body-md md:font-body-lg md:text-body-lg text-on-surface-variant max-w-sm mx-auto mb-stack-xl text-balance">
            Please check your internet connection and try again.
        </p>
<!-- CTA -->
<button class="group relative flex items-center justify-center gap-stack-sm bg-primary-container text-surface-container-lowest font-label-md text-label-md px-8 py-4 rounded-full shadow-md hover:shadow-lg transition-all duration-300 ease-out hover:scale-[1.02] active:scale-[0.98] overflow-hidden">
<!-- Subtle hover glow -->
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-full"></div>
<span class="material-symbols-outlined group-hover:-rotate-180 transition-transform duration-500 ease-in-out relative z-10" data-icon="refresh">refresh</span>
<span class="relative z-10">Retry Connection</span>
</button>
</main>
<!-- Script for subtle micro-interaction on retry (optional, demonstrates intent) -->
<script>
        document.querySelector('button').addEventListener('click', function(e) {
            const icon = this.querySelector('.material-symbols-outlined');
            icon.classList.add('animate-spin');
            setTimeout(() => {
                icon.classList.remove('animate-spin');
            }, 1000);
        });
    </script>
