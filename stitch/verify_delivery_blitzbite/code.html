<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "on-tertiary-container": "#2a2c2c",

                        "secondary": "#5f5e5e",

                        "on-background": "#271812",

                        "surface-container": "#ffe9e2",
                        "on-error": "#ffffff",

                        "on-primary-container": "#521800",
                        "primary-fixed": "#ffdbce",
                        "primary-container": "#ff5c00",
                        "inverse-on-surface": "#ffede7",

                    },

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased flex flex-col justify-between">
<!-- Top Navigation (Contextual, Back Action only) -->
<header class="w-full top-0 sticky bg-surface shadow-sm z-10 flex items-center justify-between px-margin-mobile py-stack-sm h-[64px]">
<button class="text-on-surface-variant hover:bg-surface-variant transition-colors p-2 rounded-full active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md-mobile font-bold text-primary">Verification</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-stack-xl max-w-md mx-auto w-full">
<!-- Hero Graphic/Icon -->
<div class="mb-stack-lg flex items-center justify-center w-24 h-24 rounded-full bg-primary-container text-on-primary-container shadow-sm animate-pulse-slow">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<!-- Text Content -->
<div class="text-center mb-stack-xl w-full">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-xs">Enter Delivery PIN</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please ask the customer for the 4-digit PIN to confirm handoff.</p>
</div>
<!-- OTP Input Group -->
<div class="flex gap-stack-sm justify-center mb-stack-xl w-full" id="otp-container">
<input aria-label="Digit 1" class="w-16 h-20 text-center font-display-lg text-display-lg bg-surface-variant border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all text-on-surface shadow-inner" maxlength="1" type="text"/>
<input aria-label="Digit 2" class="w-16 h-20 text-center font-display-lg text-display-lg bg-surface-variant border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all text-on-surface shadow-inner" disabled="" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="w-16 h-20 text-center font-display-lg text-display-lg bg-surface-variant border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all text-on-surface shadow-inner" disabled="" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="w-16 h-20 text-center font-display-lg text-display-lg bg-surface-variant border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface transition-all text-on-surface shadow-inner" disabled="" maxlength="1" type="text"/>
</div>
<!-- Status/Error Message (Hidden by default) -->
<div class="h-6 mb-stack-lg w-full text-center">
<span class="font-label-md text-label-md text-error hidden flex items-center justify-center gap-1" id="error-message">
<span class="material-symbols-outlined text-[16px]">error</span>
                Incorrect PIN. Please try again.
            </span>
</div>
</main>
<!-- Bottom Action Area -->
<div class="p-margin-mobile bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.05)] w-full max-w-md mx-auto sticky bottom-0 z-20">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl flex items-center justify-center gap-2 opacity-50 cursor-not-allowed transition-all duration-200" disabled="" id="confirm-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Confirm Delivery
        </button>
<button class="w-full mt-stack-sm bg-transparent text-on-surface-variant border border-outline-variant font-label-md text-label-md py-3 rounded-xl flex items-center justify-center transition-all duration-200 hover:bg-surface-variant active:scale-[0.98]">
            Customer unavailable
        </button>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[50vw] h-[50vw] rounded-full bg-surface-container blur-[100px] opacity-60"></div>
<div class="absolute top-[60%] -left-[20%] w-[60vw] h-[60vw] rounded-full bg-primary-fixed blur-[120px] opacity-20"></div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-container input');
            const confirmBtn = document.getElementById('confirm-btn');
            const errorMessage = document.getElementById('error-message');

            // Focus first input on load
            inputs[0].focus();

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Only allow numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');

                    if (e.target.value.length === 1) {
                        // Move to next input
                        if (index < inputs.length - 1) {
                            inputs[index + 1].disabled = false;
                            inputs[index + 1].focus();
                        }
                    }

                    checkAllFilled();
                });

                input.addEventListener('keydown', (e) => {
                    // Handle backspace
                    if (e.key === 'Backspace') {
                        if (e.target.value === '' && index > 0) {
                            inputs[index].disabled = true;
                            inputs[index - 1].focus();
                            inputs[index - 1].value = '';
                        }
                        errorMessage.classList.add('hidden'); // Clear error on edit
                    }
                });

                // Auto-select text on focus for easy replacement
                input.addEventListener('focus', function() {
                    this.select();
                });
            });

            function checkAllFilled() {
                let allFilled = true;
                let otpValue = '';
                inputs.forEach(input => {
                    if (input.value.length === 0) {
                        allFilled = false;
                    } else {
                        otpValue += input.value;
                    }
                });

                if (allFilled) {
                    confirmBtn.disabled = false;
                    confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    confirmBtn.classList.add('hover:bg-on-primary-fixed-variant', 'active:scale-[0.98]', 'shadow-md');
                } else {
                    confirmBtn.disabled = true;
                    confirmBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    confirmBtn.classList.remove('hover:bg-on-primary-fixed-variant', 'active:scale-[0.98]', 'shadow-md');
                }
            }

            // Simulate Verification Process
            confirmBtn.addEventListener('click', () => {
                const otp = Array.from(inputs).map(i => i.value).join('');
                
                // Add loading state
                const originalText = confirmBtn.innerHTML;
                confirmBtn.innerHTML = `<span class="material-symbols-outlined animate-spin" style="font-variation-settings: 'FILL' 0;">progress_activity</span> Verifying...`;
                confirmBtn.disabled = true;

                // Simulate API call
                setTimeout(() => {
                    if (otp === '1234') {
                        // Success scenario
                        confirmBtn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">done_all</span> Verified`;
                        confirmBtn.classList.replace('bg-primary', 'bg-[#1b5e20]'); // Using arbitrary just for success state visualization, normally would be in theme
                        
                        // Briefly show success before navigating away
                        setTimeout(() => {
                            alert('Delivery Confirmed! Navigating to next step...');
                        }, 500);

                    } else {
                        // Error scenario
                        confirmBtn.innerHTML = originalText;
                        confirmBtn.disabled = false;
                        errorMessage.classList.remove('hidden');
                        
                        // Shake animation on inputs
                        inputs.forEach(input => {
                            input.classList.add('border-2', 'border-error', 'text-error');
                            input.animate([
                                { transform: 'translateX(0)' },
                                { transform: 'translateX(-5px)' },
                                { transform: 'translateX(5px)' },
                                { transform: 'translateX(-5px)' },
                                { transform: 'translateX(5px)' },
                                { transform: 'translateX(0)' }
                            ], { duration: 300 });
                        });

                        setTimeout(() => {
                             inputs.forEach(input => {
                                input.classList.remove('border-2', 'border-error', 'text-error');
                             });
                        }, 2000);
                    }
                }, 1000);
            });
        });
    </script>
<style>
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .8; transform: scale(1.05); }
        }
    </style>
</body></html>
