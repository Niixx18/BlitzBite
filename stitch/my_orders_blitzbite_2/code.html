<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - My Orders</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
  }
</style>

    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "surface-container": "#ffe9e2",
                "secondary-fixed": "#e5e2e1",
                "on-tertiary-container": "#2a2c2c",
                "on-secondary": "#ffffff",
                "outline": "#8f7065",
                "on-secondary-container": "#656464",
                "outline-variant": "#e4beb1",
                "on-surface-variant": "#5b4137",
                "on-error-container": "#93000a",
                "surface-variant": "#fadcd2",
                "on-error": "#ffffff",
                "secondary": "#5f5e5e",
                "on-surface": "#271812",
                "background": "#fff8f6",
                "primary-fixed": "#ffdbce",
                "on-primary-fixed": "#370e00",
                "tertiary-container": "#929393",
                "surface-container-high": "#ffe2d8",
                "primary-container": "#ff5c00",
                "on-tertiary-fixed-variant": "#454747",
                "on-secondary-fixed": "#1c1b1b",
                "primary": "#a73a00",
                "surface-dim": "#f1d4ca",
                "inverse-surface": "#3e2c26",
                "primary-fixed-dim": "#ffb59a",
                "tertiary-fixed": "#e2e2e2",
                "on-tertiary-fixed": "#1a1c1c",
                "tertiary": "#5d5f5f",
                "on-primary-fixed-variant": "#802a00",
                "on-background": "#271812",
                "error": "#ba1a1a",
                "secondary-container": "#e5e2e1",
                "on-tertiary": "#ffffff",
                "error-container": "#ffdad6",
                "tertiary-fixed-dim": "#c6c6c7",
                "surface-container-highest": "#fadcd2",
                "on-secondary-fixed-variant": "#474646",
                "surface-container-low": "#fff1ec",
                "on-primary": "#ffffff",
                "surface-tint": "#a73a00",
                "surface-container-lowest": "#ffffff",
                "on-primary-container": "#521800",
                "surface-bright": "#fff8f6",

                "surface": "#fff8f6",
                "secondary-fixed-dim": "#c8c6c5"

        "borderRadius": {

                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"

        "spacing": {
                "stack-lg": "24px",
                "stack-xs": "4px",
                "gutter": "16px",
                "stack-sm": "8px",
                "stack-xl": "48px",
                "stack-md": "16px",
                "unit": "4px",
                "margin-mobile": "16px",
                "margin-desktop": "64px"
        },
        "fontFamily": {
                "label-md": ["sans-serif"],
                "body-lg": ["sans-serif"],
                "label-sm": ["sans-serif"],
                "headline-lg-mobile": ["sans-serif"],
                "body-md": ["sans-serif"],
                "headline-md": ["sans-serif"],
                "headline-lg": ["sans-serif"],
                "display-lg": ["sans-serif"]
        },
        "fontSize": {
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],

      }
    }
  }

</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<header class="sticky top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md shadow-sm">
<div class="flex justify-between items-center w-full px-4 md:px-margin-desktop max-w-7xl mx-auto h-16">
<div class="flex items-center gap-stack-lg">
<span class="font-display-lg text-display-lg font-black text-primary dark:text-primary-fixed-dim tracking-tighter">BlitzBite</span>
<div class="hidden md:flex items-center gap-stack-sm relative ml-stack-xl">
<div class="absolute left-3 flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="search" data-weight="fill" style="font-variation-settings: 'FILL' 1;">search</span>
</div>
<input class="pl-10 pr-4 py-2 w-64 bg-surface-container-low border-none rounded-full font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary-container transition-all outline-none" placeholder="Search delicious food..." type="text"/>
</div>
</div>
<div class="flex items-center gap-stack-md">
<div class="flex items-center gap-stack-sm text-on-surface-variant dark:text-on-surface-variant">
<button aria-label="shopping_cart" class="p-2 rounded-full hover:bg-primary-container/10 dark:hover:bg-primary-fixed-dim/10 transition-colors active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
</button>
<button aria-label="notifications" class="p-2 rounded-full hover:bg-primary-container/10 dark:hover:bg-primary-fixed-dim/10 transition-colors active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button aria-label="location_on" class="p-2 rounded-full hover:bg-primary-container/10 dark:hover:bg-primary-fixed-dim/10 transition-colors active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
</div>
<button class="ml-stack-sm px-6 py-2 rounded-full font-label-md text-label-md bg-transparent text-primary dark:text-primary-fixed-dim hover:bg-primary-container/10 transition-colors active:scale-95 duration-100 whitespace-nowrap">
        Sign In
      </button>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-surface-container bg-surface-variant flex-shrink-0 cursor-pointer shadow-sm hover:ring-2 hover:ring-primary-container transition-all">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A close-up studio portrait of a young professional in soft, high-key white lighting, evoking a modern, clean, and optimistic mood. The aesthetic is crisp and high-definition, aligning with a premium corporate modern identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAm-sGpmDTeAnPDCZvA_tGol_sZc3KOg6cnYJnHJLgA5qC-dP76ayNxLr3Cf7BVBcQKUfPqNPNiLYU1Qw2PBq-8A3TzMiveAWkO65EWjpfZdEN09Xv-99Em5wTQWK6kiqLIOZShFv2e99cNf7SlehMy9UjBAuBSWZWk38afxs_5tNEDMC45nBo59mu7c0bV_fk24JxoXsIkJ0A8enPomgmpxQw2P1-ezkK4gyt98kH74Ui6hr9EUs-kor9WEaqFDQw1YzEw6WXC2go"/>
</div>
</div>
</div>
<div class="h-[1px] w-full bg-outline-variant/30"></div>
</header>
<main class="flex-grow flex items-center justify-center w-full max-w-7xl mx-auto px-gutter md:px-margin-desktop py-stack-xl">
<div class="flex flex-col items-center justify-center w-full max-w-lg text-center animate-[fadeIn_0.5s_ease-out]">
<div class="relative w-48 h-48 mb-stack-lg flex items-center justify-center">
<div class="absolute inset-0 bg-primary-container/5 rounded-full blur-3xl scale-150"></div>
<div class="relative w-32 h-32 rounded-3xl bg-surface-container-lowest border border-outline-variant/30 shadow-[0_8px_30px_rgba(167,58,0,0.08)] flex items-center justify-center transform rotate-[-5deg] hover:rotate-0 hover:scale-105 transition-all duration-300 ease-out">
<div class="w-24 h-24 rounded-2xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary/40" data-icon="receipt_long">receipt_long</span>
</div>
</div>
<div class="absolute -bottom-4 -right-2 w-16 h-16 rounded-full bg-surface-container-lowest border border-outline-variant/30 shadow-lg flex items-center justify-center transform rotate-[10deg] animate-[bounce_3s_ease-in-out_infinite]">
<span class="material-symbols-outlined text-[28px] text-primary" data-icon="restaurant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-sm">No orders yet</h1>
<p class="font-body-md md:font-body-lg text-body-md md:text-body-lg text-on-surface-variant max-w-md mx-auto mb-stack-xl">
      Your future delicious meals will appear here.
    </p>
<button class="flex items-center justify-center gap-stack-sm px-8 py-3 rounded-full bg-primary-container text-on-primary border border-transparent shadow-[0_4px_14px_rgba(255,92,0,0.25)] hover:shadow-[0_6px_20px_rgba(255,92,0,0.35)] hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all duration-200 font-label-md text-label-md">
      Start Ordering
      <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
