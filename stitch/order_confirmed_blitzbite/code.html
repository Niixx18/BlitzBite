<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Success - BlitzBite</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .success-animation {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#ffe9e2",
                        "inverse-on-surface": "#ffede7",
                        "surface-container-low": "#fff1ec",
                        "surface-variant": "#fadcd2",
                        "error": "#ba1a1a",
                        "primary": "#a73a00",
                        "surface-container-high": "#ffe2d8",
                        "secondary-container": "#e5e2e1",
                        "on-tertiary-fixed": "#1a1c1c",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#2a2c2c",
                        "surface-tint": "#a73a00",
                        "on-primary-container": "#521800",
                        "primary-fixed-dim": "#ffb59a",
                        "on-secondary": "#ffffff",
                        "on-background": "#271812",
                        "inverse-primary": "#ffb59a",
                        "surface": "#fff8f6",
                        "on-surface": "#271812",
                        "tertiary": "#5d5f5f",
                        "surface-container-highest": "#fadcd2",
                        "secondary": "#5f5e5e",
                        "on-surface-variant": "#5b4137",
                        "on-error": "#ffffff",
                        "outline-variant": "#e4beb1",
                        "outline": "#8f7065",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "primary-container": "#ff5c00",
                        "inverse-surface": "#3e2c26",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#929393",
                        "on-secondary-container": "#656464",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-dim": "#f1d4ca",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffdbce",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#370e00",
                        "on-tertiary-fixed-variant": "#454747",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fff8f6",
                        "secondary-fixed": "#e5e2e1",
                        "background": "#fff8f6",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary-fixed-variant": "#802a00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "margin-desktop": "64px",
                        "gutter": "16px",
                        "stack-xs": "4px",
                        "margin-mobile": "16px",
                        "stack-lg": "24px",
                        "stack-xl": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "headline-lg": ["Geist"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<main class="w-full max-w-[480px] bg-surface rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 md:p-12 flex flex-col items-center text-center border border-surface-variant">
<!-- Animated Success Icon -->
<div class="w-24 h-24 md:w-32 md:h-32 bg-primary-container rounded-full flex items-center justify-center mb-stack-lg success-animation shadow-[0_0_40px_rgba(255,92,0,0.2)]">
<span class="material-symbols-outlined text-[48px] md:text-[64px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">
                check_circle
            </span>
</div>
<!-- Headline & Subtext -->
<div class="fade-up delay-1 w-full">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background mb-stack-sm">
                Order Placed Successfully!
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-xl">
                Your food is being prepared. Hang tight!
            </p>
</div>
<!-- Order Details Card -->
<div class="w-full bg-surface-container-low rounded-xl p-stack-md mb-stack-xl flex flex-col gap-stack-sm border border-surface-variant fade-up delay-2 text-left">
<div class="flex justify-between items-center border-b border-surface-variant pb-stack-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Order ID</span>
<span class="font-headline-md text-headline-md text-on-background">#B839-2X</span>
</div>
<div class="flex justify-between items-center py-stack-xs">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">restaurant</span>
<span class="font-body-md text-body-md text-on-background">Gourmet Burger Kitchen</span>
</div>
</div>
<div class="flex justify-between items-center pt-stack-sm border-t border-surface-variant mt-stack-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Estimated Arrival</span>
<span class="font-headline-md text-headline-md text-primary">1:30 PM</span>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-stack-md fade-up delay-3">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-md hover:bg-surface-tint hover:shadow-lg transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">location_on</span>
                Track Order
            </button>
<button class="w-full border border-outline text-on-background font-label-md text-label-md py-4 rounded-xl hover:bg-surface-container-low transition-all duration-200 active:scale-[0.98]">
                Continue Browsing
            </button>
</div>
</main>
<script>
        // Simple script to ensure animations play smoothly on load
        document.addEventListener('DOMContentLoaded', () => {
            const animatedElements = document.querySelectorAll('.fade-up, .success-animation');
            animatedElements.forEach(el => {
                el.style.animationPlayState = 'running';
            });
        });
    </script>
</body></html>
