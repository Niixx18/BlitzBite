<style>
        .glass-panel {
            background: rgba(255, 248, 246, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-1/3 bg-gradient-to-b from-surface-variant/50 to-transparent pointer-events-none"></div>
<div class="absolute -top-32 -right-32 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-32 -left-32 w-80 h-80 bg-outline-variant/30 rounded-full blur-3xl pointer-events-none"></div>
<main class="w-full max-w-sm px-margin-mobile z-10 flex flex-col gap-stack-xl relative">
<!-- Header / Identity -->
<header class="flex flex-col items-center text-center">
<div class="w-16 h-16 bg-primary text-on-primary rounded-xl flex items-center justify-center mb-stack-lg shadow-lg rotate-3 hover:rotate-0 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">electric_moped</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">BlitzBite</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.15em] mt-stack-xs">Delivery Partner</p>
</header>
<!-- Login Form Container -->
<div class="glass-panel rounded-2xl p-6 shadow-sm border border-outline-variant/30 flex flex-col gap-stack-lg">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface" for="phone-input">Enter your mobile number</label>
<!-- Phone Input Group -->
<div class="relative flex items-center bg-surface-variant rounded-xl overflow-hidden border border-transparent focus-within:border-primary focus-within:bg-surface transition-colors duration-200 group">
<!-- Country Code Selector (Visual Only for simplicity) -->
<button class="flex items-center gap-1 pl-4 pr-3 py-4 border-r border-outline-variant/50 text-on-surface font-body-lg group-focus-within:border-outline-variant transition-colors hover:bg-surface-dim" type="button">
<span class="text-xl">🇺🇸</span>
<span class="text-sm font-medium ml-1">+1</span>
<span class="material-symbols-outlined text-sm text-on-surface-variant">expand_more</span>
</button>
<!-- Input Field -->
<input autocomplete="tel" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface font-body-lg text-body-lg py-4 px-4 placeholder-tertiary w-full outline-none" id="phone-input" placeholder="000-000-0000" type="tel"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-full shadow-md hover:bg-surface-tint active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 group mt-stack-sm">
                Continue
                <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Footer / Links -->
<div class="flex flex-col items-center gap-stack-sm text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-sm">
                By continuing, you agree to our <a class="text-primary hover:underline font-medium" href="#">Terms</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
            </p>
<a class="font-label-md text-label-md text-tertiary hover:text-on-surface transition-colors mt-stack-lg" href="#">Need help signing in?</a>
</div>
</main>
<!-- Vanilla JS for basic input formatting visual feedback -->
<script>
        const phoneInput = document.getElementById('phone-input');
        
        phoneInput.addEventListener('input', function(e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
        });
    </script>
</body></html>
