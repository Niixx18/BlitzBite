<div class="flex justify-between items-center w-full px-4 md:px-margin-desktop max-w-7xl mx-auto h-16">
<!-- Left Side: Logo & Search -->
<div class="flex items-center gap-stack-lg">
<a class="font-display-lg text-display-lg font-black text-primary tracking-tighter hover:opacity-80 transition-opacity" href="#">BlitzBite</a>
<!-- Search Bar (on_left as per JSON) -->
<div class="hidden md:flex items-center bg-surface-container-high rounded-full px-4 py-2 border border-transparent focus-within:bg-surface focus-within:border-primary transition-all duration-200 shadow-sm w-64 group">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">search</span>
<input class="bg-transparent border-none focus:ring-0 text-body-md font-body-md text-on-surface w-full placeholder:text-on-surface-variant ml-2 py-0" placeholder="Search food..." type="text"/>
</div>
</div>
<!-- Right Side: Actions -->
<div class="flex items-center gap-stack-sm md:gap-stack-md">
<!-- Location Icon -->
<button aria-label="location_on" class="text-on-surface-variant hover:bg-primary-container/10 p-2 rounded-full transition-colors flex items-center justify-center w-10 h-10 group">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">location_on</span>
</button>
<!-- Notifications Icon -->
<button aria-label="notifications" class="text-on-surface-variant hover:bg-primary-container/10 p-2 rounded-full transition-colors flex items-center justify-center w-10 h-10 group relative">
<span class="material-symbols-outlined group-hover:text-primary transition-colors">notifications</span>
</button>
<!-- Shopping Cart Icon (Active State mapped here since we are on the cart page) -->
<button aria-label="shopping_cart" class="text-primary border-b-2 border-primary bg-primary-container/10 p-2 rounded-full transition-colors flex items-center justify-center w-10 h-10 Active: scale-95 duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
</button>
<!-- Primary Action -->
<button class="ml-stack-xs bg-surface border border-outline-variant hover:bg-surface-container text-on-surface font-label-md text-label-md rounded-full px-4 py-2 transition-colors shadow-sm hidden sm:block">
                    Sign In
                </button>
<img alt="User profile" class="w-8 h-8 rounded-full border border-outline-variant sm:hidden object-cover" data-alt="A small, professional headshot of a young adult with a neutral, pleasant expression. The portrait is brightly lit with a clean, light background, fitting a modern corporate identity profile picture. High quality, crisp focus." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMZdsqoWAj_RyWu5hb-BLnEB71aNNQUKeWkMck6TOCWwBk92gpubM_vwn7DfkIh-XLvYLs7pg-HU5PRDjty7lAM2out2R2ZayH1SfVdrH3TDjwRSGCliKwztvlhDkpifZovmDOrK7HIqsuqIVgRSNDpU0jIRFLbvXC9XvivpUyRBQD69GXgx89VyrWalZKBwvGLyI8PJu5OSLeTreKolbDkM_fCX7XDieJf18dZiYiG0cRedRgsiquG0Az117AalI_C2SooxOrjTc"/>
</div>

<!-- Ambient Background Glow -->

<div class="max-w-md w-full flex flex-col items-center text-center">
<!-- Illustration Container -->

<img alt="Empty Cart Illustration" class="w-32 h-32 md:w-40 md:h-40 object-cover rounded-3xl opacity-90 mix-blend-multiply" data-alt="A pristine, high-end 3D rendering of an empty, stylized shopping bag. The design is sleek and modern, utilizing a soft light-mode aesthetic with bright whites, deep charcoals, and subtle accents of energetic orange. Soft, highly diffused lighting creates a clean, premium, and appetizing atmosphere, perfect for a modern food delivery interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCneVblTFomHjgT9bHy0dkVNWPs_xTfeARKqpxY5YaShxY57trejb_qVUEcJ6lLUFc5l3dnlF-0SliD6c05dISuWd5iyOHYggx1ReN4GnDPXygV12-alXPAcqaFFiu3JSSzN16NfMKT_Q9FIuZJddjYOKBq7yuHFZjn7qwPiXc7wTastSpDYmYmIYpXmV_Fxhyzr-EW_ab-mAhrC5l9jvqAoB8mGk2oyFAlVCBqYQXkAOK2Yp81RzgkgORnF8hLcPdAMgwTVZARSfo"/>

</button>

<script>
        // Lightweight micro-interaction for the search bar expansion on desktop
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.querySelector('input[type="text"]');
            if(searchInput) {
                searchInput.addEventListener('focus', function() {
                    this.parentElement.classList.add('w-80');
                    this.parentElement.classList.remove('w-64');
                });
                searchInput.addEventListener('blur', function() {
                    this.parentElement.classList.remove('w-80');
                    this.parentElement.classList.add('w-64');
                });
            }
        });
    </script>
