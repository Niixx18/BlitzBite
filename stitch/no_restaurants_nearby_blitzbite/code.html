<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - No Restaurants Nearby</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#ffe9e2",
                        "secondary-fixed": "#e5e2e1",
                        "on-tertiary-container": "#2a2c2c",
                        "on-secondary": "#ffffff",
                        "outline": "#8f7065",
                        "on-secondary-container": "#656464",
                        "outline-variant": "#e4beb1",
                        "on-surface-variant": "#5b4137",
                        "on-error-container": "#93000a",
                        "surface-variant": "#fadcd2",
                        "on-error": "#ffffff",
                        "secondary": "#5f5e5e",
                        "on-surface": "#271812",
                        "background": "#fff8f6",
                        "primary-fixed": "#ffdbce",
                        "on-primary-fixed": "#370e00",
                        "tertiary-container": "#929393",
                        "surface-container-high": "#ffe2d8",
                        "primary-container": "#ff5c00",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary": "#a73a00",
                        "surface-dim": "#f1d4ca",
                        "inverse-surface": "#3e2c26",
                        "primary-fixed-dim": "#ffb59a",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-fixed": "#1a1c1c",
                        "tertiary": "#5d5f5f",
                        "on-primary-fixed-variant": "#802a00",
                        "on-background": "#271812",
                        "error": "#ba1a1a",
                        "secondary-container": "#e5e2e1",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-container-highest": "#fadcd2",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-container-low": "#fff1ec",
                        "on-primary": "#ffffff",
                        "surface-tint": "#a73a00",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#521800",
                        "surface-bright": "#fff8f6",
                        "inverse-primary": "#ffb59a",
                        "inverse-on-surface": "#ffede7",
                        "surface": "#fff8f6",
                        "secondary-fixed-dim": "#c8c6c5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "stack-xs": "4px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-xl": "48px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "label-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-sm": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "body-md": ["Geist"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "display-lg": ["Geist"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background h-full flex flex-col items-center justify-center">
<!-- Top Navigation (Shell suppressed based on prompt indicating an empty/dead-end state, but keeping brand anchor minimal) -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm h-16 flex justify-between items-center px-4 md:px-margin-desktop max-w-7xl mx-auto">
<div class="font-display-lg text-display-lg font-black text-primary tracking-tighter">
            BlitzBite
        </div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-primary-container/10 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</button>
</div>
</header>
<main class="w-full max-w-2xl px-margin-mobile md:px-margin-desktop text-center mt-16 md:mt-0 pt-stack-xl pb-stack-xl flex flex-col items-center">
<!-- Illustrative Container -->
<div class="relative mb-stack-lg animate-pulse" style="animation-duration: 3s;">
<div class="w-48 h-48 rounded-full bg-surface-container flex items-center justify-center shadow-lg relative overflow-hidden">
<!-- Abstract Map Pattern Background -->
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, #8f7065 1px, transparent 0); background-size: 16px 16px;"></div>
<span class="material-symbols-outlined text-primary-container text-6xl relative z-10" data-icon="location_off" style="font-variation-settings: 'FILL' 1; font-size: 80px;">location_off</span>
<!-- Magnifying Glass Decoration -->
<div class="absolute bottom-4 right-4 bg-surface rounded-full p-3 shadow-md border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant text-2xl" data-icon="search">search</span>
</div>
</div>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm md:hidden">
            We're not in your area yet
        </h1>
<h1 class="font-display-lg text-display-lg text-on-surface mb-stack-sm hidden md:block">
            We're not in your area yet
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-xl max-w-md mx-auto">
            BlitzBite is expanding fast. Change your location or notify me when we arrive.
        </p>
<!-- Form Section -->
<div class="w-full max-w-md mx-auto bg-surface-container-lowest rounded-[24px] p-stack-md shadow-sm border border-outline-variant/50 relative z-10 transition-transform duration-200 hover:scale-[1.02]">
<form class="flex flex-col gap-stack-sm">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full bg-surface-variant border-none rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors placeholder:text-on-surface-variant/70" placeholder="Enter your email address" required="" type="email"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 px-6 rounded-lg font-bold shadow-md hover:bg-primary transition-colors hover:text-on-primary active:scale-95 duration-100 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-sm" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
                    Notify Me
                </button>
</form>
<div class="mt-stack-md flex items-center justify-center gap-4">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">or</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<button class="w-full mt-stack-md border border-outline text-on-surface font-label-md text-label-md py-3 px-6 rounded-lg font-semibold hover:bg-surface-variant transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
                Change Location
            </button>
</div>
</main>
</body></html>
