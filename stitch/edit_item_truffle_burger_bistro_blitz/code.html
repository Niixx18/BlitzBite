<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Food Item - Bistro Blitz</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @font-face {
            font-family: 'Geist';
            src: url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#521800",
                        "outline": "#8f7065",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ffe9e2",
                        "on-error": "#ffffff",
                        "background": "#fff8f6",
                        "tertiary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-container-highest": "#fadcd2",
                        "inverse-on-surface": "#ffede7",
                        "primary-container": "#ff5c00",
                        "primary-fixed": "#ffdbce",
                        "on-tertiary-fixed": "#1a1c1c",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#5b4137",
                        "surface": "#fff8f6",
                        "surface-container-high": "#ffe2d8",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-tertiary-container": "#2a2c2c",
                        "secondary-container": "#e5e2e1",
                        "inverse-primary": "#ffb59a",
                        "tertiary": "#5d5f5f",
                        "surface-variant": "#fadcd2",
                        "primary": "#a73a00",
                        "on-background": "#271812",
                        "secondary-fixed": "#e5e2e1",
                        "primary-fixed-dim": "#ffb59a",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#656464",
                        "error-container": "#ffdad6",
                        "surface-dim": "#f1d4ca",
                        "surface-bright": "#fff8f6",
                        "secondary": "#5f5e5e",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container-low": "#fff1ec",
                        "on-surface": "#271812",
                        "on-primary-fixed": "#370e00",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-tint": "#a73a00",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#929393",
                        "on-primary-fixed-variant": "#802a00",
                        "outline-variant": "#e4beb1",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#3e2c26"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-mobile": "16px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "stack-sm": "8px",
                        "stack-xs": "4px",
                        "stack-xl": "48px",
                        "stack-lg": "24px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Geist"],
                        "headline-lg": ["Geist"],
                        "display-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-sm": ["Geist"],
                        "body-md": ["Geist"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen font-sans antialiased">
<!-- Task-focused screen: Navigation shell suppressed -->
<div class="max-w-4xl mx-auto px-gutter md:px-margin-desktop py-stack-xl flex flex-col gap-stack-xl">
<!-- Header Actions -->
<header class="flex items-center justify-between w-full">
<button class="flex items-center gap-stack-xs text-on-surface-variant hover:text-primary transition-colors group cursor-pointer border-none bg-transparent p-0">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform duration-200" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md">Back to Menu</span>
</button>
<div class="hidden md:block">
<!-- Placeholder for top right actions if needed -->
</div>
</header>
<!-- Main Form Area -->
<main class="w-full">
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Edit Food Item</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-xs">Update details, pricing, and availability.</p>
</div>
<form class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant p-stack-lg md:p-[32px] flex flex-col gap-stack-lg relative overflow-hidden">
<!-- Image Section -->
<section class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant">Item Image</label>
<div class="relative w-full h-[240px] md:h-[320px] rounded-lg overflow-hidden group border border-surface-variant bg-surface-container-low flex items-center justify-center">
<img alt="Truffle Burger" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" data-alt="A mouth-watering, high-definition close-up of a gourmet Truffle Burger resting on a modern slate plate. The burger features a thick, perfectly seared beef patty, a layer of melting aged white cheddar, and generous shavings of fresh black truffle. Warm, high-contrast studio lighting highlights the glistening textures and rich browns, set against a deeply blurred, dark sophisticated kitchen background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtOrYRFyXKzfqwRDts-yf_srWwxJLiFmVEbquQ07AqaWVGaIAha5vzcRAgZb0M874uz7EU_BCJCiZGFHYyFeNIEexndKZ8Y2lTjuSmaxXBIJ-GP9kMEUZQaCVcJADnksxmUBNAQLnB9xb_gbrZbbgVAEGFD0YWsy2bZ2x8pBFhdzZHNPQdTgTrFNZcC0T3ODzNngVGxXUmOv-h2CJrE4Ev2x9kqAdqveMKgJd7Snl437tnFIVljEQ9blVB6CtMqmhvJMfcHBpC7_E"/>
<div class="absolute inset-0 bg-on-surface/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-sm">
<button class="bg-surface-container-lowest text-on-surface px-6 py-3 rounded-md font-label-md text-label-md flex items-center gap-stack-sm hover:scale-105 transition-transform shadow-sm" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="photo_camera">photo_camera</span>
                                Replace Image
                            </button>
</div>
</div>
</section>
<!-- Grid Layout for Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Item Name -->
<div class="flex flex-col gap-stack-sm md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="itemName">Item Name</label>
<input class="w-full bg-surface-container-highest border-none focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary rounded-md px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all outline-none" id="itemName" required="" type="text" value="Truffle Burger"/>
</div>
<!-- Price -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="itemPrice">Price ($)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md material-symbols-outlined text-[20px]" data-icon="attach_money">attach_money</span>
<input class="w-full bg-surface-container-highest border-none focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary rounded-md pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all outline-none" id="itemPrice" required="" step="0.01" type="number" value="24.50"/>
</div>
</div>
<!-- Category -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="itemCategory">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-highest border-none focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary rounded-md px-4 py-3 font-body-md text-body-md text-on-surface appearance-none transition-all outline-none cursor-pointer" id="itemCategory">
<option value="starters">Starters</option>
<option selected="" value="mains">Mains</option>
<option value="desserts">Desserts</option>
<option value="beverages">Beverages</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-stack-sm md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="itemDescription">Description</label>
<textarea class="w-full bg-surface-container-highest border-none focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary rounded-md px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all outline-none resize-y" id="itemDescription" required="" rows="4">A half-pound Wagyu beef patty cooked to perfection, topped with melted aged white cheddar, caramelized onions, wild mushrooms, and finished with fresh black truffle shavings. Served on a toasted brioche bun.</textarea>
</div>
<!-- Dietary Labels -->
<div class="flex flex-col gap-stack-sm md:col-span-2 mt-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant">Dietary Tags</label>
<div class="flex flex-wrap gap-stack-sm">
<button class="px-4 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md hover:border-primary hover:text-primary transition-colors cursor-pointer" type="button">Vegan</button>
<button class="px-4 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md hover:border-primary hover:text-primary transition-colors cursor-pointer" type="button">Gluten-Free</button>
<!-- Selected State Chip -->
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary border border-primary font-label-md text-label-md flex items-center gap-1 transition-colors cursor-pointer" type="button">
                                Signature <span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
<button class="px-4 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md hover:border-primary hover:text-primary transition-colors cursor-pointer" type="button">Spicy</button>
</div>
</div>
</div>
<!-- Action Footer -->
<div class="flex flex-col-reverse md:flex-row justify-between items-center gap-stack-md pt-stack-lg mt-stack-md border-t border-surface-variant">
<button class="w-full md:w-auto px-6 py-3 rounded-md font-label-md text-label-md border border-error text-error hover:bg-error-container hover:text-on-error-container transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
                        Delete Item
                    </button>
<div class="flex gap-stack-md w-full md:w-auto">
<button class="flex-1 md:flex-none px-6 py-3 rounded-md font-label-md text-label-md bg-transparent text-on-surface hover:bg-surface-container-highest transition-colors" type="button">
                            Cancel
                        </button>
<button class="flex-1 md:flex-none px-8 py-3 rounded-md font-label-md text-label-md bg-primary text-on-primary hover:bg-on-primary-fixed-variant shadow-sm hover:shadow-md transition-all active:scale-95 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="save">save</span>
                            Update Item
                        </button>
</div>
</div>
</form>
</main>
</div>
</body></html>
