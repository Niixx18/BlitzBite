<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - Splash Screen</title>

            theme: {

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"

                    "spacing": {
                        "gutter": "16px",
                        "stack-md": "16px",
                        "unit": "4px",

<style>body {
    background-color: #fff8f6;
    /* background */
    color: #271812;
    /* on-background */
    font-family: "Geist", sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh
    }
.splash-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuD4Cs3yDLBJnvflzKWf6sCDl_PY-P-219B7j7XYxh6gHgD9D-4wBNaAG01nGvosPDYTGB7X-GXJsCoEjDbpe1zaXtSEG-9RVQpyZPfMaq6wtxl5AdTLS2FYrOMeEgnOUY-y7tR1wIbzkk3Mnq3beIMJ3H0z4EWpFFLGY-xzPchSlYn8nf7DKADHEgF_cK7qsuHNRZWr-c3mCGjMf71gJMvgKmMiM2cFZ71lM-EjcCmRsXLSZ0WUm_TfDl11LL2pjW9-8hrlcQ-3HyM);
    background-size: cover;
    background-position: center;
    z-index: 1
    }
.splash-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(255, 248, 246, 0.2), rgba(39, 24, 18, 0.8));
    z-index: 2
    }
.content-container {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    padding: 48px 24px;
    box-sizing: border-box
    }
.logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20vh
    }
.brand-text {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    font-style: italic
    }
.sub-text {
    font-size: 20px;
    color: #ffdbce;
    /* primary-fixed */
    margin-top: 8px;
    font-weight: 500
    }
.action-area {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 32px
    }
.btn-primary {
    background-color: #ff5c00;
    /* primary-container */
    color: #fff;
    /* on-primary */
    padding: 16px 32px;
    border-radius: 9999px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 24px rgba(255, 92, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px
    }
.btn-primary:hover {
    transform: translatey(-2px);
    box-shadow: 0 12px 32px rgba(255, 92, 0, 0.5)
    }
.btn-secondary {
    background-color: transparent;
    color: #fff;
    padding: 16px 32px;
    border-radius: 9999px;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    text-decoration: none;
    border: 1px solid rgba(255, 255, 255, 0.4);
    transition: background-color 0.2s ease
    }
.btn-secondary:hover {
    background-color: rgba(255, 255, 255, 0.1)
    }</style>
</head>
<body>
<!-- Background Image with Overlay -->
<div class="splash-bg" data-alt="Dynamic high-speed photography of fresh, vibrant ingredients like tomatoes, basil, and chili peppers mid-air. The scene is brightly lit with high contrast, emphasizing freshness and velocity. The color palette incorporates vibrant oranges, deep reds, and fresh greens against a slightly blurred, neutral dark background. The aesthetic is modern, energetic, and perfectly suited for a high-end food delivery app splash screen."></div>
<div class="splash-overlay"></div>
<!-- Main Content -->
<div class="content-container">
<div class="logo-area">
<!-- Simulated Icon/Logo -->
<div class="w-24 h-24 bg-primary-container rounded-3xl rotate-12 flex items-center justify-center shadow-2xl mb-6">
<span class="material-symbols-outlined text-on-primary" style="font-size: 48px; font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="brand-text">BlitzBite</h1>
<p class="sub-text">Velocity Meets Flavor</p>
</div>
<div class="action-area">
<a class="btn-primary" href="#">
                Get Started
                <span class="material-symbols-outlined">arrow_forward</span>
</a>
<a class="btn-secondary" href="#">
                Log In
            </a>
</div>
</div>
<!-- No Navigation Shells per Semantic Logic for Splash Screens -->
</body></html>
