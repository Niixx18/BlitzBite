<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            .material-symbols-outlined.fill {
                font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#ff5c00",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fff8f6",
                        "primary-fixed": "#ffdbce",
                        "inverse-surface": "#3e2c26",
                        "error-container": "#ffdad6",
                        "background": "#fff8f6",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-dim": "#f1d4ca",
                        "primary": "#a73a00",
                        "on-surface-variant": "#5b4137",
                        "tertiary": "#5d5f5f",
                        "surface-container-high": "#ffe2d8",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-secondary": "#ffffff",
                        "on-surface": "#271812",
                        "surface-container-highest": "#fadcd2",
                        "tertiary-container": "#929393",
                        "primary-fixed-dim": "#ffb59a",
                        "secondary": "#5f5e5e",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-tertiary-container": "#2a2c2c",
                        "on-error": "#ffffff",
                        "secondary-container": "#e5e2e1",
                        "on-background": "#271812",
                        "outline-variant": "#e4beb1",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#370e00",
                        "inverse-primary": "#ffb59a",
                        "on-secondary-fixed-variant": "#474646",
                        "on-primary-container": "#521800",
                        "on-secondary-container": "#656464",
                        "surface-variant": "#fadcd2",
                        "secondary-fixed": "#e5e2e1",
                        "surface-tint": "#a73a00",
                        "surface-container": "#ffe9e2",
                        "on-primary-fixed-variant": "#802a00",
                        "inverse-on-surface": "#ffede7",
                        "tertiary-fixed": "#e2e2e2",
                        "surface": "#fff8f6",
                        "outline": "#8f7065",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-low": "#fff1ec",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "stack-sm": "8px",
                        "stack-xl": "48px",
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "stack-xs": "4px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Geist", "sans-serif"],
                        "body-md": ["Geist", "sans-serif"],
                        "label-sm": ["Geist", "sans-serif"],
                        "headline-md": ["Geist", "sans-serif"],
                        "headline-lg": ["Geist", "sans-serif"],
                        "label-md": ["Geist", "sans-serif"],
                        "display-lg": ["Geist", "sans-serif"],
                        "headline-lg-mobile": ["Geist", "sans-serif"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col items-center justify-center p-margin-mobile relative overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Ambient Background Depth (Level 0 enhancement) -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] rounded-full bg-primary-fixed/20 blur-[100px] opacity-70"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[500px] h-[500px] rounded-full bg-surface-container-high blur-[80px] opacity-60"></div>
</div>
<!-- Main Login Card (Level 1 Elevation) -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.04)] border border-outline-variant/30 p-stack-lg flex flex-col gap-stack-lg z-10 relative">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-stack-sm mb-stack-sm">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter italic select-none">BlitzBite</h1>
<div class="mt-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-unit">Enter your phone number to continue</p>
</div>
</header>
<!-- Interactive Form -->
<form class="flex flex-col gap-stack-lg" onsubmit="event.preventDefault();">
<!-- Phone Input Group -->
<div class="flex flex-col gap-unit">
<label class="sr-only" for="phone-input">Phone Number</label>
<!-- Soft-Focus Input Container -->
<div class="group relative flex items-center bg-secondary-container/30 rounded-lg transition-all duration-200 border-2 border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary focus-within:shadow-[0_4px_12px_rgba(167,58,0,0.08)] overflow-hidden">
<!-- Country Code Selector (Simulated Dropdown) -->
<button class="flex items-center gap-unit px-stack-md py-stack-md h-full border-r border-outline-variant/40 hover:bg-surface-container-low transition-colors outline-none focus:bg-surface-container-low text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">public</span>
<span class="font-label-md text-label-md">+1</span>
<span class="material-symbols-outlined text-[18px] text-on-surface-variant transition-transform group-focus-within:rotate-180">arrow_drop_down</span>
</button>
<!-- Actual Input -->
<input autocomplete="tel" class="w-full bg-transparent border-none outline-none focus:ring-0 px-stack-md py-stack-md font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/50 tracking-wide" id="phone-input" placeholder="000-000-0000" type="tel"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-[14px] rounded-lg shadow-[0_4px_14px_rgba(167,58,0,0.2)] hover:shadow-[0_6px_20px_rgba(167,58,0,0.3)] hover:-translate-y-[1px] active:translate-y-[1px] active:shadow-sm transition-all duration-200 flex items-center justify-center gap-stack-sm overflow-hidden relative group" type="submit">
<span class="relative z-10 flex items-center gap-stack-sm">
                    Send OTP
                    <span class="material-symbols-outlined text-[20px] transition-transform duration-300 group-hover:translate-x-1">arrow_forward</span>
</span>
<!-- Subtle hover overlay -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-stack-md my-unit">
<div class="h-[1px] bg-outline-variant/40 flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or</span>
<div class="h-[1px] bg-outline-variant/40 flex-1"></div>
</div>
<!-- Secondary Logins (Ghost Style) -->
<div class="flex flex-col gap-stack-sm">
<button class="w-full bg-transparent border border-outline-variant rounded-lg py-stack-sm px-stack-md flex items-center justify-center gap-stack-md hover:bg-surface-container-low hover:border-outline transition-all duration-200 active:bg-surface-container" type="button">
<!-- Simple generic globe icon for Google as SVG replacement to avoid external assets -->
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">language</span>
<span class="font-label-md text-label-md text-on-surface">Continue with Google</span>
</button>
<button class="w-full bg-transparent border border-outline-variant rounded-lg py-stack-sm px-stack-md flex items-center justify-center gap-stack-md hover:bg-surface-container-low hover:border-outline transition-all duration-200 active:bg-surface-container" type="button">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">devices</span>
<span class="font-label-md text-label-md text-on-surface">Continue with Apple</span>
</button>
</div>
<!-- Footer terms -->
<p class="font-label-sm text-label-sm text-center text-on-surface-variant mt-stack-sm px-stack-md">
            By continuing, you agree to our <a class="text-primary hover:underline underline-offset-2" href="#">Terms of Service</a> and <a class="text-primary hover:underline underline-offset-2" href="#">Privacy Policy</a>.
        </p>
</main>
<!-- Vanilla JS for micro-interaction on input -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const phoneInput = document.getElementById('phone-input');
            
            // Simple formatter for visual feedback
            phoneInput.addEventListener('input', function (e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
                e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
            });
        });
    </script>
</body></html>
