<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - Payment Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#ffe9e2",
                        "inverse-on-surface": "#ffede7",
                        "surface-container-low": "#fff1ec",
                        "surface-variant": "#fadcd2",
                        "error": "#ba1a1a",
                        "primary": "#a73a00",
                        "surface-container-high": "#ffe2d8",
                        "secondary-container": "#e5e2e1",
                        "on-tertiary-fixed": "#1a1c1c",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#2a2c2c",
                        "surface-tint": "#a73a00",
                        "on-primary-container": "#521800",
                        "primary-fixed-dim": "#ffb59a",
                        "on-secondary": "#ffffff",
                        "on-background": "#271812",
                        "inverse-primary": "#ffb59a",
                        "surface": "#fff8f6",
                        "on-surface": "#271812",
                        "tertiary": "#5d5f5f",
                        "surface-container-highest": "#fadcd2",
                        "secondary": "#5f5e5e",
                        "on-surface-variant": "#5b4137",
                        "on-error": "#ffffff",
                        "outline-variant": "#e4beb1",
                        "outline": "#8f7065",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "primary-container": "#ff5c00",
                        "inverse-surface": "#3e2c26",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#929393",
                        "on-secondary-container": "#656464",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-dim": "#f1d4ca",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffdbce",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#370e00",
                        "on-tertiary-fixed-variant": "#454747",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fff8f6",
                        "secondary-fixed": "#e5e2e1",
                        "background": "#fff8f6",
                        "secondary-fixed-dim": "#c8c6c5",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "margin-desktop": "64px",
                        "gutter": "16px",
                        "stack-xs": "4px",
                        "margin-mobile": "16px",
                        "stack-lg": "24px",
                        "stack-xl": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-md": ["Geist"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "headline-lg": ["Geist"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-16 pb-24 md:pb-0">
<!-- TopAppBar (Transactional - Hidden on Web, Custom on Mobile for 'Back') -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline shadow-sm flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 transition-colors duration-200">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant dark:hover:bg-on-tertiary-container transition-colors active:scale-95 duration-150 text-on-surface-variant dark:text-on-secondary-fixed-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim">Select Payment</h1>
</div>
<div class="font-label-sm text-label-sm text-on-surface-variant bg-surface-variant px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>
            Secure Checkout
        </div>
</header>
<main class="flex-grow max-w-3xl mx-auto w-full px-margin-mobile md:px-margin-desktop py-stack-lg flex flex-col gap-stack-lg">
<!-- Order Summary Snippet -->
<section class="bg-surface-container rounded-xl p-stack-md flex justify-between items-center shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Total to Pay</p>
<p class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mt-1">$42.50</p>
</div>
<button class="font-label-md text-label-md text-primary bg-primary/10 px-4 py-2 rounded-full hover:bg-primary/20 transition-colors">
                View Details
            </button>
</section>
<!-- Saved Methods (Highlight) -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-1">Saved Methods</h2>
<!-- Saved Card 1 (Active/Selected) -->
<label class="group relative bg-surface border-2 border-primary rounded-xl p-stack-md flex items-center gap-stack-md cursor-pointer hover:shadow-[0_4px_20px_rgba(0,0,0,0.05)] transition-all transform hover:scale-[1.01]">
<div class="w-12 h-8 bg-surface-variant rounded flex items-center justify-center">
<span class="material-symbols-outlined text-primary">credit_card</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface font-semibold">Visa ending in 4242</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Expires 12/25</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary">check</span>
</div>
<input checked="" class="hidden" name="payment_method" type="radio" value="saved_visa_4242"/>
</label>
<!-- UPI Suggestion -->
<label class="group relative bg-surface border border-outline-variant rounded-xl p-stack-md flex items-center gap-stack-md cursor-pointer hover:shadow-[0_4px_20px_rgba(0,0,0,0.05)] transition-all transform hover:scale-[1.01] hover:border-primary">
<div class="w-12 h-8 bg-surface-variant rounded flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">qr_code_scanner</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface">Google Pay</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">user@upi</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></div>
<input class="hidden" name="payment_method" type="radio" value="saved_gpay"/>
</label>
</section>
<!-- Other Methods -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-1 mt-stack-md">Other Ways to Pay</h2>
<div class="bg-surface border border-outline-variant rounded-xl overflow-hidden divide-y divide-outline-variant shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
<!-- UPI -->
<label class="p-stack-md flex items-center gap-stack-md cursor-pointer hover:bg-surface-container-lowest transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">account_balance_wallet</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Add New UPI ID</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</label>
<!-- Cards -->
<label class="p-stack-md flex items-center gap-stack-md cursor-pointer hover:bg-surface-container-lowest transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">add_card</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Credit / Debit Card</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</label>
<!-- Net Banking -->
<label class="p-stack-md flex items-center gap-stack-md cursor-pointer hover:bg-surface-container-lowest transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">account_balance</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Net Banking</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</label>
<!-- COD -->
<label class="p-stack-md flex items-center gap-stack-md cursor-pointer hover:bg-surface-container-lowest transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">payments</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Cash on Delivery</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Pay when your food arrives</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></div>
<input class="hidden" name="payment_method" type="radio" value="cod"/>
</label>
</div>
</section>
</main>
<!-- Sticky Footer CTA -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant p-margin-mobile md:px-margin-desktop md:py-stack-md z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-safe">
<div class="max-w-3xl mx-auto w-full">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-xl hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm">
<span class="material-symbols-outlined">lock</span>
                Pay $42.50
            </button>
</div>
</footer>
<script>
        // Simple JS for radio selection visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const radioLabels = document.querySelectorAll('label:has(input[type="radio"])');
            
            radioLabels.forEach(label => {
                const input = label.querySelector('input');
                if(!input) return;

                input.addEventListener('change', (e) => {
                    // Reset all
                    radioLabels.forEach(l => {
                        l.classList.remove('border-2', 'border-primary');
                        l.classList.add('border', 'border-outline-variant');
                        
                        const circle = l.querySelector('.rounded-full.border-2');
                        if(circle) {
                            circle.classList.remove('border-primary', 'bg-primary');
                            circle.classList.add('border-outline-variant');
                            circle.innerHTML = ''; // remove check icon
                        }
                    });

                    // Set active
                    if (e.target.checked) {
                        label.classList.remove('border', 'border-outline-variant');
                        label.classList.add('border-2', 'border-primary');
                        
                        const circle = label.querySelector('.rounded-full.border-2');
                        if(circle) {
                            circle.classList.remove('border-outline-variant');
                            circle.classList.add('border-primary', 'bg-primary');
                            circle.innerHTML = '<span class="material-symbols-outlined text-[16px] text-on-primary">check</span>';
                        }
                    }
                });
            });
        });
    </script>
</body></html>
