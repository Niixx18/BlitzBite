<style type="text/tailwindcss">

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-gutter antialiased relative overflow-hidden">
<!-- Ambient Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center opacity-30">
<div class="w-[80vw] h-[80vw] md:w-[600px] md:h-[600px] bg-primary-fixed rounded-full blur-3xl transform translate-y-1/4"></div>
</div>
<!-- Main Canvas -->
<main class="relative z-10 w-full max-w-[420px] bg-surface rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30 p-stack-xl flex flex-col items-center">
<!-- Brand Identity -->
<h1 class="font-display-lg text-display-lg text-primary-container tracking-tighter italic mb-stack-lg select-none">
            BlitzBite
        </h1>
<!-- Intent Header -->
<div class="text-center mb-stack-xl w-full">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-stack-xs">
                Verification
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant px-stack-sm">
                Enter the 4-digit code sent to <br/> <strong class="font-label-md text-label-md text-on-surface">+1 (555) *** **89</strong>
</p>
</div>
<!-- Form Canvas -->
<form class="w-full flex flex-col items-center" id="otp-form">
<!-- OTP Inputs container -->
<div class="flex gap-stack-md justify-center w-full mb-stack-lg" id="otp-inputs">
<input aria-label="Digit 1" autofocus="" class="w-[60px] h-[72px] md:w-[72px] md:h-[84px] text-center font-display-lg text-display-lg text-on-surface bg-surface-container border-2 border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary-container focus:outline-none transition-all duration-200 placeholder:text-outline-variant shadow-sm focus:shadow-md" inputmode="numeric" maxlength="1" pattern="[0-9]*" placeholder="-" type="text"/>
<input aria-label="Digit 2" class="w-[60px] h-[72px] md:w-[72px] md:h-[84px] text-center font-display-lg text-display-lg text-on-surface bg-surface-container border-2 border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary-container focus:outline-none transition-all duration-200 placeholder:text-outline-variant shadow-sm focus:shadow-md" inputmode="numeric" maxlength="1" pattern="[0-9]*" placeholder="-" type="text"/>
<input aria-label="Digit 3" class="w-[60px] h-[72px] md:w-[72px] md:h-[84px] text-center font-display-lg text-display-lg text-on-surface bg-surface-container border-2 border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary-container focus:outline-none transition-all duration-200 placeholder:text-outline-variant shadow-sm focus:shadow-md" inputmode="numeric" maxlength="1" pattern="[0-9]*" placeholder="-" type="text"/>
<input aria-label="Digit 4" class="w-[60px] h-[72px] md:w-[72px] md:h-[84px] text-center font-display-lg text-display-lg text-on-surface bg-surface-container border-2 border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary-container focus:outline-none transition-all duration-200 placeholder:text-outline-variant shadow-sm focus:shadow-md" inputmode="numeric" maxlength="1" pattern="[0-9]*" placeholder="-" type="text"/>
</div>
<!-- Resend Logic -->
<div class="flex items-center justify-center gap-unit mb-stack-xl font-body-md text-body-md text-on-surface-variant h-[24px]">
<span id="resend-text">Didn't receive code?</span>
<button class="font-label-md text-label-md text-tertiary-fixed-dim cursor-not-allowed transition-colors" disabled="" id="resend-btn" type="button">
                    Resend in <span id="timer">00:59</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-stack-md rounded-lg shadow-sm hover:scale-[1.02] hover:shadow-md active:scale-95 transition-all duration-200 flex items-center justify-center gap-stack-sm opacity-50 cursor-not-allowed" disabled="" id="verify-btn" type="submit">
<span>Verify Identity</span>
<span class="material-symbols-outlined" data-icon="arrow_forward" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
<!-- Secondary Action (Back) -->
<button class="mt-stack-md text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors flex items-center gap-unit" type="button">
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_back">arrow_back</span>
                Change phone number
            </button>
</form>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-inputs input');
            const verifyBtn = document.getElementById('verify-btn');
            const resendBtn = document.getElementById('resend-btn');
            const timerSpan = document.getElementById('timer');
            const resendText = document.getElementById('resend-text');
            
            let timeLeft = 59;
            let timerInterval;

            // Timer Logic
            function startTimer() {
                clearInterval(timerInterval);
                timeLeft = 59;
                resendBtn.disabled = true;
                resendBtn.classList.add('text-tertiary-fixed-dim', 'cursor-not-allowed');
                resendBtn.classList.remove('text-primary', 'hover:underline', 'cursor-pointer');
                
                timerInterval = setInterval(() => {
                    timeLeft--;
                    const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                    timerSpan.textContent = `00:${seconds}`;
                    resendBtn.innerHTML = `Resend in <span id="timer">00:${seconds}</span>`;

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        resendBtn.disabled = false;
                        resendBtn.innerHTML = 'Resend Code';
                        resendBtn.classList.remove('text-tertiary-fixed-dim', 'cursor-not-allowed');
                        resendBtn.classList.add('text-primary', 'hover:underline', 'cursor-pointer');
                    }
                }, 1000);
            }

            startTimer();

            resendBtn.addEventListener('click', () => {
                if(!resendBtn.disabled) {
                    // Simulate resend action
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                    checkInputs();
                    startTimer();
                }
            });

            // Input Logic
            function checkInputs() {
                const allFilled = Array.from(inputs).every(input => input.value.length === 1);
                if (allFilled) {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    verifyBtn.disabled = true;
                    verifyBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            }

            inputs.forEach((input, index) => {
                // Focus behavior
                input.addEventListener('focus', (e) => {
                    e.target.select();
                });

                // Input behavior
                input.addEventListener('input', (e) => {
                    // Only allow numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value !== '') {
                        // Move to next input if available
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    checkInputs();
                });

                // Backspace behavior
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                            inputs[index - 1].value = ''; // Optional: clear previous on backspace
                        }
                    }
                });

                // Paste behavior
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 4);
                    
                    if (pastedData) {
                        for (let i = 0; i < pastedData.length; i++) {
                            if (inputs[i]) {
                                inputs[i].value = pastedData[i];
                            }
                        }
                        const focusIndex = Math.min(pastedData.length, 3);
                        inputs[focusIndex].focus();
                        checkInputs();
                    }
                });
            });
            
            // Form Submit Simulation
            document.getElementById('otp-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const code = Array.from(inputs).map(i => i.value).join('');
                if(code.length === 4) {
                    verifyBtn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span><span>Verifying...</span>`;
                    // Simulate API call
                    setTimeout(() => {
                        alert(`Code ${code} verified successfully! (Simulation)`);
                        verifyBtn.innerHTML = `<span>Verify Identity</span><span class="material-symbols-outlined" data-icon="arrow_forward" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>`;
                    }, 1500);
                }
            });
        });
    </script>
</body></html>
