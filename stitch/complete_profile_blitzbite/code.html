<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlitzBite - Onboarding</title>

                      "on-secondary-container": "#656464",

                      "secondary-fixed": "#e5e2e1",
                      "surface-tint": "#a73a00",
                      "surface-container": "#ffe9e2",
                      "on-primary-fixed-variant": "#802a00",

                      "on-tertiary": "#ffffff",
                      "secondary-fixed-dim": "#c8c6c5",

                      "surface-container-lowest": "#ffffff"
              },
              "borderRadius": {

                      "lg": "0.5rem",

                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "stack-md": "16px",
                      "unit": "4px",
                      "stack-sm": "8px",
                      "stack-xl": "48px",
                      "margin-desktop": "64px",
                      "margin-mobile": "16px",
                      "stack-xs": "4px",
                      "stack-lg": "24px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Geist"
                      ],
                      "body-md": [

                      ],

</head>
<body class="bg-background text-on-background h-full font-body-md selection:bg-primary-container selection:text-on-primary">
<!-- Linear/Transactional page - Suppress Navigation Shells -->
<main class="min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop bg-surface relative overflow-hidden">
<!-- Decorative Background Blob -->
<div class="absolute top-0 right-0 -mr-32 -mt-32 w-96 h-96 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
<div class="absolute bottom-0 left-0 -ml-32 -mb-32 w-96 h-96 bg-surface-variant rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
<div class="w-full max-w-md relative z-10">
<!-- Header -->
<div class="text-center mb-stack-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter italic mb-stack-sm">BlitzBite</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Let's get you set up for lightning-fast delivery.</p>
</div>
<!-- Progress Indicator -->
<div class="flex items-center justify-between mb-stack-xl">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-label-md text-label-md shadow-sm">1</div>
<span class="mt-2 font-label-sm text-label-sm text-on-surface">Basics</span>
</div>
<div class="flex-1 h-1 mx-4 bg-surface-variant rounded-full overflow-hidden">
<div class="w-1/2 h-full bg-primary-container rounded-full"></div>
</div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md">2</div>
<span class="mt-2 font-label-sm text-label-sm text-on-surface-variant">Address</span>
</div>
<div class="flex-1 h-1 mx-4 bg-surface-variant rounded-full"></div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md">3</div>
<span class="mt-2 font-label-sm text-label-sm text-on-surface-variant">Done</span>
</div>
</div>
<!-- Onboarding Form Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-stack-lg shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-lg">Your Details</h2>
<form class="space-y-stack-md">
<!-- Full Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-stack-sm">
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-3 px-6 rounded-xl hover:scale-[1.02] active:scale-95 transition-transform flex items-center justify-center gap-2 shadow-sm" type="button">
                            Continue to Address
                            <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
<!-- Tertiary Action -->
<div class="mt-stack-md text-center">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1" type="button">
                        Already have an account? <span class="font-bold">Log in</span>
</button>
</div>
</div>
</div>
</main>
<style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</body></html>
